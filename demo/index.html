<!DOCTYPE html>
<html>
        <head>
                <title>My App</title>
                <meta charset="utf-8">
                <meta content="width=device-width, initial-scale=1.0" name="viewport">
                <meta http-equiv="cache-control" content="no-cache" />
                <meta http-equiv="pragma" content="no-cache" />
                <meta http-equiv="expires" content="0" />

                <script type="importmap">
                        {
                                "imports": {
                                        "ae": "../ae/js/index.js"
                                }
                        }
                </script>
                <script type="module">
                        import { App, setConfig } from 'ae';

                        const cacheBust = new URLSearchParams(location.search).get('cacheBust') === 'true';
                        const corePath = new URL('../ae/', import.meta.url);
                        const sitePath = new URL('./', import.meta.url);

                        setConfig({corePath, sitePath, cacheBust});
                        const app = new App({corePath, sitePath, cacheBust});
                        app.setup();
                </script>
        </head>
        <body>
        </body>
</html>
